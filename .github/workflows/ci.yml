name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Select Xcode
        id: toolchain
        run: |
          set -euo pipefail
          # Project targets macOS 26 / Swift 6.2 — find the best available Xcode
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          fi

          swift --version
          XCODE_BUILD_VERSION="$(xcodebuild -version)"
          printf '%s\n' "$XCODE_BUILD_VERSION"
          XCODE_VERSION="$(printf '%s\n' "$XCODE_BUILD_VERSION" | awk '/^Xcode / { print $2 }')"
          echo "xcode_version=$XCODE_VERSION" >> "$GITHUB_OUTPUT"

          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version || echo 0)"
          echo "sdk_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          # v2 forces cache invalidation after the 2026-04-12 bugbook→dahso rename, which left
          # stale absolute paths like /Users/runner/work/bugbook/bugbook/.build/... inside the
          # cached Sparkle XCFramework Info.plist.
          key: ${{ runner.os }}-xcode-${{ steps.toolchain.outputs.xcode_version }}-spm-v2-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ steps.toolchain.outputs.xcode_version }}-spm-v2-
            ${{ runner.os }}-spm-v2-

      - name: Cache CEF runtime
        uses: actions/cache@v5
        with:
          path: macos/vendor/cef
          key: ${{ runner.os }}-cef-${{ hashFiles('scripts/fetch-cef.sh') }}
          restore-keys: |
            ${{ runner.os }}-cef-

      - name: Verify Ghostty archive
        run: |
          set -euo pipefail
          ARCHIVE="Frameworks/GhosttyKit.xcframework/macos-arm64/libghostty-fat.a"
          test -f "$ARCHIVE"
          file "$ARCHIVE"
          ar -t "$ARCHIVE" >/dev/null

      - name: Fetch CEF runtime
        run: bash scripts/fetch-cef.sh

      - name: Build
        run: |
          swift build

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Run SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            SWIFT_FILES="$(find Sources Tests -name '*.swift' -print | sort)"
          else
            SWIFT_FILES="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | grep '^\(Sources\|Tests\)/.*\.swift$' || true)"
          fi

          if [ -z "$SWIFT_FILES" ]; then
            echo "No changed Swift files to lint."
            exit 0
          fi

          FILE_COUNT="$(printf '%s\n' "$SWIFT_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
          printf 'Linting %s changed Swift files\n' "$FILE_COUNT"
          printf '%s\n' "$SWIFT_FILES" | while IFS= read -r file; do
            [ -n "$file" ] || continue
            swiftlint lint --config .swiftlint-ci.yml "$file"
          done

      - name: Run swift-format
        run: |
          set -euo pipefail

          if ! swift format lint --help >/dev/null 2>&1; then
            echo "swift format is not available in the selected toolchain"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            SWIFT_FILES="$(find Sources Tests -name '*.swift' -print | sort)"
          else
            SWIFT_FILES="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | grep '^\(Sources\|Tests\)/.*\.swift$' || true)"
          fi

          if [ -z "$SWIFT_FILES" ]; then
            echo "No changed Swift files to format-check."
            exit 0
          fi

          FILE_COUNT="$(printf '%s\n' "$SWIFT_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
          printf 'Format-checking %s changed Swift files\n' "$FILE_COUNT"
          printf '%s\n' "$SWIFT_FILES" | while IFS= read -r file; do
            [ -n "$file" ] || continue
            swift format lint "$file"
          done

      - name: Run tests
        run: swift test

      - name: Run smoke test
        run: bash scripts/smoke-cli.sh

      - name: Generate Xcode project
        run: |
          cd macos
          xcodegen generate

      - name: Build macOS app target
        run: |
          xcodebuild \
            -project /Users/runner/work/dahso/dahso/macos/Dahso.xcodeproj \
            -scheme DahsoApp \
            -configuration Debug \
            build
