name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        id: toolchain
        run: |
          set -euo pipefail
          # Project targets macOS 26 / Swift 6.2 — find the best available Xcode
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          fi

          swift --version

          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version || echo 0)"
          echo "sdk_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"

          if python3 - "$SDK_VERSION" <<'PY'
import sys
version = sys.argv[1].split(".")
major = int(version[0]) if version and version[0].isdigit() else 0
sys.exit(0 if major >= 26 else 1)
PY
          then
            echo "has_required_sdk=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_required_sdk=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Report skipped build matrix
        if: steps.toolchain.outputs.has_required_sdk != 'true'
        run: |
          echo "::warning::macOS SDK ${{ steps.toolchain.outputs.sdk_version }} is below the required macOS 26 SDK; build/test/smoke steps are skipped on this runner"

      - name: Build
        if: steps.toolchain.outputs.has_required_sdk == 'true'
        run: |
          swift build

      - name: Run tests
        if: steps.toolchain.outputs.has_required_sdk == 'true'
        run: swift test

      - name: Run smoke test
        if: steps.toolchain.outputs.has_required_sdk == 'true'
        run: bash scripts/smoke-cli.sh
