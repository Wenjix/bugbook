name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        id: toolchain
        run: |
          set -euo pipefail
          # Project targets macOS 26 / Swift 6.2 — find the best available Xcode
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          fi

          swift --version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / { print $2; exit }')"
          echo "xcode_version=$XCODE_VERSION" >> "$GITHUB_OUTPUT"

          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version || echo 0)"
          echo "sdk_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-xcode-${{ steps.toolchain.outputs.xcode_version }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ steps.toolchain.outputs.xcode_version }}-spm-
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          swift build

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint Sources/

      - name: Run tests
        run: swift test

      - name: Run smoke test
        run: bash scripts/smoke-cli.sh
