# SwiftLint configuration for Dahso
# Thresholds set to pass existing codebase. Tighten as code is refactored.

excluded:
  - .build
  - build
  - DerivedData
  - Package.swift

opt_in_rules:
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - contains_over_filter_count
  - flatmap_over_map_reduce
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture

disabled_rules:
  - trailing_comma
  - todo
  - opening_brace
  - multiple_closures_with_trailing_closure
  - force_cast
  - force_try
  - shorthand_operator

line_length:
  warning: 150
  error: 300
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

function_body_length:
  warning: 100
  error: 300

type_body_length:
  warning: 500
  error: 2500

file_length:
  warning: 1500
  error: 3000

cyclomatic_complexity:
  warning: 15
  error: 50

function_parameter_count:
  warning: 6
  error: 12

large_tuple:
  warning: 4
  error: 6

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - i
    - j
    - a
    - b
    - c
    - f
    - n
    - s
    - t
    - u
    - db
    - to
    - op
