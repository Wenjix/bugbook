name: Bugbook
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: "2.6.0"
  SentryCocoa:
    url: https://github.com/getsentry/sentry-cocoa
    version: "8.40.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    version: "0.7.9"
  # GhosttyKit: GPU-accelerated terminal engine (local XCFramework)
  # Linked via Frameworks/GhosttyKit.xcframework
targets:
  BugbookCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/BugbookCore
    info:
      path: App/BugbookCore-Info.plist
      properties:
        CFBundleIdentifier: com.maxforsey.BugbookCore
        CFBundleName: BugbookCore
        CFBundlePackageType: FMWK
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookCore
        PRODUCT_NAME: BugbookCore
        PRODUCT_MODULE_NAME: BugbookCore
        DEFINES_MODULE: YES
  ChromiumBridge:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumBridge
    dependencies:
      - sdk: AppKit.framework
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.ChromiumBridge
        PRODUCT_NAME: ChromiumBridge
        PRODUCT_MODULE_NAME: ChromiumBridge
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        SKIP_INSTALL: YES
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
  BugbookHelper:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/BugbookHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper
        PRODUCT_NAME: "Bugbook Helper"
        EXECUTABLE_NAME: "Bugbook Helper"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.dev.helper
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper
  BugbookHelperAlerts:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/BugbookHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.alerts
        PRODUCT_NAME: "Bugbook Helper (Alerts)"
        EXECUTABLE_NAME: "Bugbook Helper (Alerts)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.dev.helper.alerts
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.alerts
  BugbookHelperGPU:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/BugbookHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.gpu
        PRODUCT_NAME: "Bugbook Helper (GPU)"
        EXECUTABLE_NAME: "Bugbook Helper (GPU)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.dev.helper.gpu
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.gpu
  BugbookHelperPlugin:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/BugbookHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.plugin
        PRODUCT_NAME: "Bugbook Helper (Plugin)"
        EXECUTABLE_NAME: "Bugbook Helper (Plugin)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.dev.helper.plugin
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.plugin
  BugbookHelperRenderer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/BugbookHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.renderer
        PRODUCT_NAME: "Bugbook Helper (Renderer)"
        EXECUTABLE_NAME: "Bugbook Helper (Renderer)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.dev.helper.renderer
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook.helper.renderer
  BugbookApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/Bugbook
        excludes:
          - MCP
      - path: App/Assets.xcassets
    dependencies:
      - target: BugbookCore
      - target: ChromiumBridge
      - target: BugbookHelper
      - target: BugbookHelperAlerts
      - target: BugbookHelperGPU
      - target: BugbookHelperPlugin
      - target: BugbookHelperRenderer
      - package: Sparkle
      - package: SentryCocoa
        product: Sentry
      - package: FluidAudio
      - framework: ../Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: Metal.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: QuartzCore.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: IOSurface.framework
      - sdk: WebKit.framework
    postBuildScripts:
      - name: Copy CEF Assets
        script: |
          bash "$PROJECT_DIR/../scripts/copy-cef-assets.sh" \
            "$TARGET_BUILD_DIR/$WRAPPER_NAME" \
            "$BUILT_PRODUCTS_DIR/Bugbook Helper.app" \
            "$BUILT_PRODUCTS_DIR/Bugbook Helper (Alerts).app" \
            "$BUILT_PRODUCTS_DIR/Bugbook Helper (GPU).app" \
            "$BUILT_PRODUCTS_DIR/Bugbook Helper (Plugin).app" \
            "$BUILT_PRODUCTS_DIR/Bugbook Helper (Renderer).app"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Bugbook
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        SUFeedURL: ""
        SUPublicEDKey: ""
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.bugbook.sidebar-reference
            UTTypeDescription: Bugbook Sidebar Reference
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification: {}
        NSMicrophoneUsageDescription: Bugbook needs microphone access to record meeting audio for live transcription.
        NSAudioCaptureUsageDescription: Bugbook records system audio during meetings so transcripts include remote participants alongside your own voice.
    entitlements:
      path: App/Bugbook.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook
        PRODUCT_NAME: Bugbook
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        OTHER_LDFLAGS: ["-lz", "-lc++"]
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev
          ASSETCATALOG_COMPILER_APPICON_NAME: DevAppIcon
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [DEBUG, BUGBOOK_DEV, BUGBOOK_BROWSER_CHROMIUM]
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [BUGBOOK_BROWSER_CHROMIUM]
  BugbookUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Tests/BugbookUITests
    dependencies:
      - target: BugbookApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookUITests
        TEST_TARGET_NAME: BugbookApp
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BugbookApp:
    build:
      targets:
        BugbookApp: all
        BugbookCore: all
        BugbookUITests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: UIViewLayoutFeedbackLoopDebuggingThreshold
          value: "100"
          isEnabled: true
    test:
      config: Debug
      targets:
        - BugbookUITests
    archive:
      config: Release
