name: Dahso
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: "2.6.0"
  SentryCocoa:
    url: https://github.com/getsentry/sentry-cocoa
    version: "8.40.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    version: "0.7.9"
  # GhosttyKit: GPU-accelerated terminal engine (local XCFramework)
  # Linked via Frameworks/GhosttyKit.xcframework
targets:
  DahsoCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/DahsoCore
    info:
      path: App/DahsoCore-Info.plist
      properties:
        CFBundleIdentifier: com.maxforsey.DahsoCore
        CFBundleName: DahsoCore
        CFBundlePackageType: FMWK
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.DahsoCore
        PRODUCT_NAME: DahsoCore
        PRODUCT_MODULE_NAME: DahsoCore
        DEFINES_MODULE: YES
  ChromiumBridge:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumBridge
    dependencies:
      - sdk: AppKit.framework
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.ChromiumBridge
        PRODUCT_NAME: ChromiumBridge
        PRODUCT_MODULE_NAME: ChromiumBridge
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        SKIP_INSTALL: YES
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
  DahsoHelper:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/DahsoHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper
        PRODUCT_NAME: "Dahso Helper"
        EXECUTABLE_NAME: "Dahso Helper"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev.helper
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper
  DahsoHelperAlerts:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/DahsoHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.alerts
        PRODUCT_NAME: "Dahso Helper (Alerts)"
        EXECUTABLE_NAME: "Dahso Helper (Alerts)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev.helper.alerts
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.alerts
  DahsoHelperGPU:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/DahsoHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.gpu
        PRODUCT_NAME: "Dahso Helper (GPU)"
        EXECUTABLE_NAME: "Dahso Helper (GPU)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev.helper.gpu
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.gpu
  DahsoHelperPlugin:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/DahsoHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.plugin
        PRODUCT_NAME: "Dahso Helper (Plugin)"
        EXECUTABLE_NAME: "Dahso Helper (Plugin)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev.helper.plugin
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.plugin
  DahsoHelperRenderer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ChromiumHelper
    dependencies:
      - framework: vendor/cef/current/Release/Chromium Embedded Framework.framework
        embed: false
    info:
      path: App/DahsoHelper-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.renderer
        PRODUCT_NAME: "Dahso Helper (Renderer)"
        EXECUTABLE_NAME: "Dahso Helper (Renderer)"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/cef/current
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - CEF_API_VERSION=13900
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev.helper.renderer
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.helper.renderer
  DahsoApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/Dahso
        excludes:
          - MCP
      - path: App/Assets.xcassets
    dependencies:
      - target: DahsoCore
      - target: ChromiumBridge
      - target: DahsoHelper
      - target: DahsoHelperAlerts
      - target: DahsoHelperGPU
      - target: DahsoHelperPlugin
      - target: DahsoHelperRenderer
      - package: Sparkle
      - package: SentryCocoa
        product: Sentry
      - package: FluidAudio
      - framework: ../Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: Metal.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: QuartzCore.framework
      - sdk: IOSurface.framework
      - sdk: WebKit.framework
    postBuildScripts:
      - name: Copy CEF Assets
        script: |
          bash "$PROJECT_DIR/../scripts/copy-cef-assets.sh" \
            "$TARGET_BUILD_DIR/$WRAPPER_NAME" \
            "$BUILT_PRODUCTS_DIR/Dahso Helper.app" \
            "$BUILT_PRODUCTS_DIR/Dahso Helper (Alerts).app" \
            "$BUILT_PRODUCTS_DIR/Dahso Helper (GPU).app" \
            "$BUILT_PRODUCTS_DIR/Dahso Helper (Plugin).app" \
            "$BUILT_PRODUCTS_DIR/Dahso Helper (Renderer).app"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Dahso
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        SUFeedURL: ""
        SUPublicEDKey: ""
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.dahso.sidebar-reference
            UTTypeDescription: Dahso Sidebar Reference
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification: {}
        NSMicrophoneUsageDescription: Dahso needs microphone access to record meeting audio for live transcription.
        NSAudioCaptureUsageDescription: Dahso records system audio during meetings so transcripts include remote participants alongside your own voice.
    entitlements:
      path: App/Dahso.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso
        PRODUCT_NAME: Dahso
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        OTHER_LDFLAGS: ["-lz", "-lc++"]
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev
          ASSETCATALOG_COMPILER_APPICON_NAME: DevAppIcon
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [DEBUG, DAHSO_DEV, DAHSO_BROWSER_CHROMIUM]
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [DAHSO_BROWSER_CHROMIUM]
  DahsoUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Tests/DahsoUITests
    dependencies:
      - target: DahsoApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.DahsoUITests
        TEST_TARGET_NAME: DahsoApp
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DahsoApp:
    build:
      targets:
        DahsoApp: all
        DahsoCore: all
        DahsoUITests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: UIViewLayoutFeedbackLoopDebuggingThreshold
          value: "100"
          isEnabled: true
    test:
      config: Debug
      targets:
        - DahsoUITests
    archive:
      config: Release
