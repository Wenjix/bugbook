name: Bugbook
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  SentryCocoa:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
targets:
  BugbookCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/BugbookCore
    info:
      path: App/BugbookCore-Info.plist
      properties:
        CFBundleIdentifier: com.maxforsey.BugbookCore
        CFBundleName: BugbookCore
        CFBundlePackageType: FMWK
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookCore
        PRODUCT_NAME: BugbookCore
        PRODUCT_MODULE_NAME: BugbookCore
        DEFINES_MODULE: YES
  BugbookApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/BugbookSwift
      - path: App/Assets.xcassets
    dependencies:
      - target: BugbookCore
      - package: Sparkle
      - package: SentryCocoa
        product: Sentry
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Bugbook
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        SUFeedURL: ""
        SUPublicEDKey: ""
    entitlements:
      path: App/Bugbook.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook
        PRODUCT_NAME: Bugbook
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
  BugbookUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Tests/BugbookUITests
    dependencies:
      - target: BugbookApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookUITests
        TEST_TARGET_NAME: BugbookApp
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BugbookApp:
    build:
      targets:
        BugbookApp: all
        BugbookCore: all
        BugbookUITests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: UIViewLayoutFeedbackLoopDebuggingThreshold
          value: "100"
          isEnabled: true
    test:
      config: Debug
      targets:
        - BugbookUITests
    archive:
      config: Release
