name: Bugbook
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: "2.6.0"
  SentryCocoa:
    url: https://github.com/getsentry/sentry-cocoa
    version: "8.40.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    version: "0.7.9"
targets:
  BugbookCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/BugbookCore
    info:
      path: App/BugbookCore-Info.plist
      properties:
        CFBundleIdentifier: com.maxforsey.BugbookCore
        CFBundleName: BugbookCore
        CFBundlePackageType: FMWK
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookCore
        PRODUCT_NAME: BugbookCore
        PRODUCT_MODULE_NAME: BugbookCore
        DEFINES_MODULE: YES
  BugbookApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/Bugbook
        excludes:
          - MCP
      - path: App/Assets.xcassets
    dependencies:
      - target: BugbookCore
      - package: Sparkle
      - package: SentryCocoa
        product: Sentry
      - package: FluidAudio
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: WebKit.framework
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Bugbook
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        SUFeedURL: ""
        SUPublicEDKey: ""
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.bugbook.sidebar-reference
            UTTypeDescription: Bugbook Sidebar Reference
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification: {}
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
                - mkdn
              public.mime-type:
                - text/markdown
        NSMicrophoneUsageDescription: Bugbook needs microphone access to record meeting audio for live transcription.
        NSAudioCaptureUsageDescription: Bugbook records system audio during meetings so transcripts include remote participants alongside your own voice.
    entitlements:
      path: App/Bugbook.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook
        PRODUCT_NAME: Bugbook
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Dahso.dev
          ASSETCATALOG_COMPILER_APPICON_NAME: DevAppIcon
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [DEBUG, BUGBOOK_DEV]
          ONLY_ACTIVE_ARCH: YES
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.Bugbook
  BugbookUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Tests/BugbookUITests
    dependencies:
      - target: BugbookApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookUITests
        TEST_TARGET_NAME: BugbookApp
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BugbookApp:
    build:
      targets:
        BugbookApp: all
        BugbookCore: all
        BugbookUITests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: UIViewLayoutFeedbackLoopDebuggingThreshold
          value: "100"
          isEnabled: true
    test:
      config: Debug
      targets:
        - BugbookUITests
    archive:
      config: Release
