name: DahsoMobile
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  Dahso:
    path: ..
targets:
  DahsoMobileApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Sources/DahsoMobile
        excludes:
          - App/DahsoMobileApp.swift
      - path: App
    dependencies:
      - package: Dahso
        product: DahsoCore
      - target: DahsoShareExtension
        embed: true
    settings:
      base:
        DEVELOPMENT_TEAM: H9N9P29TX5
        CODE_SIGN_ENTITLEMENTS: App/DahsoMobile.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.DahsoMobile
        PRODUCT_NAME: Dahso
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Dahso
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSCameraUsageDescription: Dahso uses the camera to capture photos for your notes.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Dahso uses your microphone to record audio notes.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Dahso uses your photo library to embed images in your notes.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
  DahsoShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
    dependencies:
      - package: Dahso
        product: DahsoCore
    settings:
      base:
        DEVELOPMENT_TEAM: H9N9P29TX5
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.DahsoMobile.ShareExtension
        PRODUCT_NAME: DahsoShareExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/DahsoShareExtension.entitlements
schemes:
  DahsoMobileApp:
    build:
      targets:
        DahsoMobileApp: all
        DahsoShareExtension: all
    run:
      config: Debug
    archive:
      config: Release
