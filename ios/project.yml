name: BugbookMobile
options:
  minimumXcodeGenVersion: 2.40.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  BugbookSwift:
    path: ..
targets:
  BugbookMobileApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Sources/BugbookMobile
        excludes:
          - App/BugbookMobileApp.swift
      - path: App
    dependencies:
      - package: BugbookSwift
        product: BugbookCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxforsey.BugbookMobile
        PRODUCT_NAME: Bugbook
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Bugbook
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  BugbookMobileApp:
    build:
      targets:
        BugbookMobileApp: all
    run:
      config: Debug
    archive:
      config: Release
